version: "3.8"
services:
  host:
    build: ./host
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - auth
      - cards
      - users
      - ui_controls

  auth:
    build: ./auth
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development

  cards:
    build: ./cards
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development

  users:
    build: ./users
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development

  ui_controls:
    build: ./ui_controls
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
